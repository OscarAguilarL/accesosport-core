spring:
  application:
    name: accesosport-api
  profiles:
    active: local

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/carreras_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: 60000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
        order_updates: true
        order_inserts: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  security:
    filter:
      order: 10

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

app:
  checkin:
    token:
      valid-hours: ${APP_CHECKIN_TOKEN_VALID_HOURS:12}
  security:
    jwt:
      secret: ${APP_JWT_SECRET}          # Sin default — requerido en todos los entornos
      expiration: ${APP_JWT_EXPIRATION:86400000}
      refreshExpiration: ${APP_JWT_REFRESH_EXPIRATION:604800000}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  bootstrap:
    enabled: true
    fail-on-error: false

    roles:
      enabled: true

    default-admin:
      enabled: ${APP_ADMIN_ENABLED:true}
      email: ${APP_ADMIN_EMAIL:admin@accesosport.com}
      password: ${APP_ADMIN_PASSWORD:password123}

  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}
    environment: ${APP_ENV:local}

  scheduler:
    event-lifecycle:
      fixed-delay-ms: ${APP_SCHEDULER_LIFECYCLE_DELAY_MS:60000}
      complete-after-hours: ${APP_SCHEDULER_COMPLETE_AFTER_HOURS:12}
    reminder:
      fixed-delay-ms: ${APP_SCHEDULER_REMINDER_DELAY_MS:3600000}

resend:
  api-key: ${RESEND_API_KEY}
  from-email: ${RESEND_FROM_EMAIL:noreply@accesosport.com}


# Logging
logging:
  level:
    root: INFO
    com.accesosport: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: off
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Server
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false
