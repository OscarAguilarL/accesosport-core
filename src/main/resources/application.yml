spring:
  application:
    name: athletix-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/carreras_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: 60000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
        order_updates: true
        order_inserts: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  security:
    filter:
      order: 10

app:
  security:
    jwt:
      secret: ${APP_JWT_SECRET}          # Sin default — requerido en todos los entornos
      expiration: ${APP_JWT_EXPIRATION:86400000}
      refreshExpiration: ${APP_JWT_REFRESH_EXPIRATION:604800000}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:*}
  bootstrap:
    enabled: true
    fail-on-error: false

    roles:
      enabled: true

    default-admin:
      enabled: ${APP_ADMIN_ENABLED:true}
      email: ${APP_ADMIN_EMAIL:admin@accesosport.com}
      password: ${APP_ADMIN_PASSWORD:password123}


# Logging
logging:
  level:
    root: INFO
    com.grupocaos.products.athletix: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: off
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Server
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false
